name: Frontend CI

on:
  pull_request:
    paths:
      - "privasyncdemo/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: privasyncdemo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: privasyncdemo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build